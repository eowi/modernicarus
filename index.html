<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Modern Icarus Pocket</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Lightweight QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* --- PURE BLACK MOBILE CSS (QR SYNC EDITION v1.2) --- */
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #888888;
            --neon-yellow: #ffff00;
            --neon-green: #39ff14;
            --danger: #ff0055;
            --warning: #FFA500;
            --border: #333333;
            --focus: #00f3ff;
            --step-bg: #222222;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
        }

        /* Typography */
        h1, h2, h3, p { margin: 0; }
        
        /* Layout Containers */
        .header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header .pocket { color: var(--neon-yellow); }
        .header .version { color: var(--text-dim); font-size: 10px; font-weight: normal; }

        /* QR Sync Button */
        .btn-sync {
            background: transparent;
            border: 1px solid var(--neon-blue, #00f3ff);
            color: var(--neon-blue, #00f3ff);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-sync:active { background: rgba(0, 243, 255, 0.2); }
        
        .container {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Reusable Card */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .card-header {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        /* --- STEPPER UI --- */
        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }
        .input-wrapper:last-child { margin-bottom: 0; }
        
        .input-wrapper label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
        }

        .stepper-group {
            display: flex;
            align-items: center;
            background: #1c1c1c;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: border 0.2s;
        }
        .stepper-group:focus-within {
            border-color: var(--focus);
        }

        .step-btn {
            background: var(--step-bg);
            border: none;
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
        }
        .step-btn:active { background: #444; }
        
        .stepper-group input {
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            border: none;
            color: #fff;
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            flex: 1;
            width: 100%;
            padding: 0 4px;
        }
        .stepper-group input:focus { outline: none; }

        /* Capital Input */
        .capital-group input {
            font-size: 24px !important;
            color: var(--focus) !important;
            letter-spacing: 1px;
            text-align: center;
        }
        .capital-group .step-btn { font-size: 28px; }

        /* Split Columns for Sites */
        .site-grid { display: flex; gap: 12px; }
        .site-col { flex: 1; display: flex; flex-direction: column; padding: 12px; }
        
        .site-col .step-btn { width: 44px; font-size: 20px; }
        .site-col .stepper-group input { font-size: 18px; }

        /* Results Panel */
        .results-panel {
            background: #000;
            border: 2px dashed #444;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .stake-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #222;
        }
        
        .stake-label { font-size: 13px; color: var(--text-dim); font-weight: 600; }
        .stake-val {
            font-size: 18px; font-weight: 800; font-family: monospace;
            color: var(--neon-yellow); letter-spacing: 1px;
        }

        .profit-container { margin-top: 12px; }
        .profit-label {
            font-size: 11px; color: var(--text-dim); text-transform: uppercase;
            font-weight: 800; margin-bottom: 4px;
        }
        .profit-val {
            font-size: 32px; font-weight: 900; font-family: monospace;
            color: var(--danger); letter-spacing: -1px; transition: color 0.3s;
        }
        
        .profit-val.positive {
            color: var(--neon-green);
            text-shadow: 0 0 16px rgba(57, 255, 20, 0.4);
        }

        /* Risk Margin Animation */
        @keyframes blink-orange {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .profit-val.warning {
            color: var(--warning);
            text-shadow: 0 0 16px rgba(255, 165, 0, 0.4);
            animation: blink-orange 1.5s infinite ease-in-out;
        }

        /* Scratchpad */
        .scratchpad-section {
            display: flex;
            flex-direction: column;
            padding: 0;
            border: none;
            border-top: 1px solid var(--border);
            border-radius: 0;
            background: #050505;
        }
        .scratchpad-header {
            padding: 12px 16px 4px 16px;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: bold;
        }
        textarea.scratch {
            background: transparent;
            border: none;
            color: #ddd;
            font-family: inherit;
            font-size: 14px;
            padding: 10px 16px 20px 16px;
            width: 100%;
            min-height: 120px;
            resize: none;
        }
        textarea.scratch:focus { outline: none; }

        /* --- QR MODAL --- */
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #111;
            border: 1px solid var(--neon-blue);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }
        .modal-title {
            color: var(--text-main);
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .qr-container {
            background: #fff; /* QR needs contrast */
            padding: 16px;
            border-radius: 8px;
        }
        .btn-close-qr {
            background: transparent;
            border: 2px solid var(--danger);
            color: var(--danger);
            font-size: 16px;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-close-qr:active {
            background: rgba(255, 0, 85, 0.2);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 10px;
            color: #444;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Modern Icarus <span class="pocket">Pocket</span> <span class="version">v1.2</span></h1>
        <button id="btnSync" class="btn-sync">QR SYNC</button>
    </header>
    
    <!-- QR Modal -->
    <div id="qrModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">Scan to Transfer</div>
            <div class="qr-container" id="qrcode"></div>
            <button id="btnCloseQr" class="btn-close-qr">CLOSE</button>
        </div>
    </div>

    <main class="container">
        
        <!-- GLOBAL CAPITAL -->
        <section class="card">
            <div class="card-header">BANKROLL (LIVE CAPITAL $)</div>
            <div class="input-wrapper capital-group">
                <div class="stepper-group">
                    <button class="step-btn minus" data-target="capInput" data-step="500" data-dir="-1">−</button>
                    <input type="number" id="capInput" value="20000" step="100" inputmode="decimal">
                    <button class="step-btn plus" data-target="capInput" data-step="500" data-dir="1">+</button>
                </div>
            </div>
        </section>

        <!-- SITES GRID -->
        <div class="site-grid">
            <!-- SITE 1 -->
            <section class="card site-col">
                <div class="card-header" style="color:var(--neon-yellow)">Site 1</div>
                
                <div class="input-wrapper">
                    <label>Odds</label>
                    <div class="stepper-group">
                        <button class="step-btn minus" data-target="odds1" data-step="0.01" data-dir="-1">−</button>
                        <input type="number" id="odds1" placeholder="--" step="0.01" inputmode="decimal">
                        <button class="step-btn plus" data-target="odds1" data-step="0.01" data-dir="1">+</button>
                    </div>
                </div>
                
                <div class="input-wrapper">
                    <label>Bonus %</label>
                    <div class="stepper-group">
                        <button class="step-btn minus" data-target="bonus1" data-step="1" data-dir="-1">−</button>
                        <input type="number" id="bonus1" value="10" step="1" inputmode="numeric">
                        <button class="step-btn plus" data-target="bonus1" data-step="1" data-dir="1">+</button>
                    </div>
                </div>
            </section>

            <!-- SITE 2 -->
            <section class="card site-col">
                <div class="card-header" style="color:var(--neon-yellow)">Site 2</div>
                
                <div class="input-wrapper">
                    <label>Odds</label>
                    <div class="stepper-group">
                        <button class="step-btn minus" data-target="odds2" data-step="0.01" data-dir="-1">−</button>
                        <input type="number" id="odds2" placeholder="--" step="0.01" inputmode="decimal">
                        <button class="step-btn plus" data-target="odds2" data-step="0.01" data-dir="1">+</button>
                    </div>
                </div>
                
                <div class="input-wrapper">
                    <label>Bonus %</label>
                    <div class="stepper-group">
                        <button class="step-btn minus" data-target="bonus2" data-step="1" data-dir="-1">−</button>
                        <input type="number" id="bonus2" value="10" step="1" inputmode="numeric">
                        <button class="step-btn plus" data-target="bonus2" data-step="1" data-dir="1">+</button>
                    </div>
                </div>
            </section>
        </div>

        <!-- RESULTS -->
        <section class="results-panel" id="resultsPanel">
            <div class="stake-row">
                <span class="stake-label">Stake 1</span>
                <span class="stake-val" id="res1">--</span>
            </div>
            <div class="stake-row" style="border-bottom:none; margin-bottom:0; padding-bottom:0;">
                <span class="stake-label">Stake 2</span>
                <span class="stake-val" id="res2">--</span>
            </div>

            <div class="profit-container">
                <div class="profit-label">Net Profit (Bonus Included)</div>
                <div class="profit-val" id="resProfit">--</div>
            </div>
        </section>

    </main>

    <!-- SCRATCHPAD -->
    <section class="scratchpad-section">
        <div class="scratchpad-header">Scratchpad (Auto-saved)</div>
        <textarea id="scratchpad" class="scratch" placeholder="Type betting notes here..."></textarea>
    </section>

    <footer class="footer">
        Add to Home Screen for Full App UI.
    </footer>

    <!-- --- JAVASCRIPT LOGIC --- -->
    <script>
        // DOM
        const elCap = document.getElementById('capInput');
        const elOdds1 = document.getElementById('odds1');
        const elBonus1 = document.getElementById('bonus1');
        const elOdds2 = document.getElementById('odds2');
        const elBonus2 = document.getElementById('bonus2');
        
        const res1 = document.getElementById('res1');
        const res2 = document.getElementById('res2');
        const resProfit = document.getElementById('resProfit');
        const resultsPanel = document.getElementById('resultsPanel');

        const stepBtns = document.querySelectorAll('.step-btn');
        const btnSync = document.getElementById('btnSync');
        const scratchpad = document.getElementById('scratchpad');
        
        // QR Modal DOM
        const qrModal = document.getElementById('qrModal');
        const qrContainer = document.getElementById('qrcode');
        const btnCloseQr = document.getElementById('btnCloseQr');

        // Storage Keys
        const STORAGE_KEY = 'icarus_pocket_v1_2_state';
        const NOTES_KEY   = 'icarus_pocket_v1_2_notes';

        // Init
        function initApp() {
            
            // 1. Check URL Params for Quick Sync (Inbound Sync)
            const params = new URLSearchParams(window.location.search);
            if (params.has('cap')) {
                // Load core values
                elCap.value = params.get('cap');
                elOdds1.value = params.get('o1') || '';
                elBonus1.value = params.get('b1') || 10;
                elOdds2.value = params.get('o2') || '';
                elBonus2.value = params.get('b2') || 10;
                
                // Load Encoded Scratchpad
                if (params.has('no')) {
                    try {
                        const decodedNotes = decodeURIComponent(params.get('no'));
                        scratchpad.value = decodedNotes;
                        localStorage.setItem(NOTES_KEY, decodedNotes); // Immediately save
                    } catch(e) { console.error("Could not decode notes"); }
                }

                // Clean URL (remove params physically from address bar so reloads don't reset state)
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({path: cleanUrl}, '', cleanUrl);
                
                saveState(); // Overwrite local state with freshly synced data
            } else {
                // Normal Load
                loadState();
                loadScratchpad();
            }

            attachListeners();
            calculate(); 
        }

        // Haptic Feedback
        function triggerHaptic() {
            if (navigator.vibrate) {
                // Short 10ms vibration for button feel
                navigator.vibrate(10); 
            }
        }

        // Listeners
        function attachListeners() {
            // Typing
            [elCap, elOdds1, elBonus1, elOdds2, elBonus2].forEach(input => {
                input.addEventListener('input', () => {
                    calculate();
                    saveState();
                });
            });

            // Steppers
            stepBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    triggerHaptic();
                    handleStep(e.target);
                });
            });

            // Scratchpad Auto-save
            scratchpad.addEventListener('input', () => {
                localStorage.setItem(NOTES_KEY, scratchpad.value);
            });

            // --- QR SYNC OUTBOUND ---
            btnSync.addEventListener('click', () => {
                triggerHaptic();
                
                // Build Payload URL
                const url = new URL(window.location.protocol + "//" + window.location.host + window.location.pathname);
                url.searchParams.set('cap', elCap.value);
                if (elOdds1.value) url.searchParams.set('o1', elOdds1.value);
                url.searchParams.set('b1', elBonus1.value || 0);
                if (elOdds2.value) url.searchParams.set('o2', elOdds2.value);
                url.searchParams.set('b2', elBonus2.value || 0);
                
                if (scratchpad.value.trim() !== '') {
                    url.searchParams.set('no', encodeURIComponent(scratchpad.value));
                }
                
                // Clear previous QR
                qrContainer.innerHTML = "";
                
                // Generate QR Code via CDN Library
                new QRCode(qrContainer, {
                    text: url.toString(),
                    width: 200,
                    height: 200,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L // Low error correction = less dense/faster scan
                });

                // Show Modal
                qrModal.classList.add('active');
            });

            btnCloseQr.addEventListener('click', () => {
                triggerHaptic();
                qrModal.classList.remove('active');
            });
        }

        // Step Handler
        function handleStep(btn) {
            const targetId = btn.getAttribute('data-target');
            const targetInput = document.getElementById(targetId);
            const stepNum = parseFloat(btn.getAttribute('data-step'));
            const direction = parseFloat(btn.getAttribute('data-dir'));

            if (!targetInput) return;

            let currentVal = parseFloat(targetInput.value);
            if (isNaN(currentVal)) {
                if (targetId.includes('odds')) currentVal = 1.00;
                else if (targetId.includes('bonus')) currentVal = 10;
                else currentVal = 20000;
            }

            let newVal = currentVal + (stepNum * direction);

            // Bounds
            if (targetId.includes('odds')) {
                if (newVal < 1.01) newVal = 1.01;
                newVal = parseFloat(newVal.toFixed(2)); 
            } else if (targetId.includes('bonus')) {
                if (newVal < 0) newVal = 0;
                if (newVal > 100) newVal = 100;
            } else {
                if (newVal < 100) newVal = 100; 
            }

            targetInput.value = newVal;
            calculate();
            saveState();
        }

        // Math v6.3 Port
        function calcROI(cap, o1, o2, bonusPercent1, bonusPercent2) {
            if (o1 <= 1 || o2 <= 1) return { b1: 0, b2: 0, netProfit: 0 };
            
            const k1 = (parseFloat(bonusPercent1) || 0) / 100;
            const k2 = (parseFloat(bonusPercent2) || 0) / 100;
            
            const num = cap * (o2 - k2);
            const den = o1 + o2 - k1 - k2;
            
            if (den <= 0) return { b1: 0, b2: 0, netProfit: 0 };
            
            const b1 = num / den;
            const b2 = cap - b1;
            
            const netProfit = (b1 * o1) + (b2 * k2) - cap;
            
            return { b1, b2, netProfit };
        }

        // Calculator & UI Updates
        function calculate() {
            const cap = parseFloat(elCap.value);
            const o1 = parseFloat(elOdds1.value);
            const b1 = parseFloat(elBonus1.value) || 0;
            const o2 = parseFloat(elOdds2.value);
            const b2 = parseFloat(elBonus2.value) || 0;
            
            if (!cap || !o1 || !o2 || o1 <= 1 || o2 <= 1) {
                res1.textContent = '--';
                res2.textContent = '--';
                resProfit.textContent = '--';
                resProfit.className = 'profit-val';
                resultsPanel.style.borderColor = '#444';
                return;
            }

            const res = calcROI(cap, o1, o2, b1, b2);

            res1.textContent = Math.floor(res.b1).toLocaleString();
            res2.textContent = Math.floor(res.b2).toLocaleString();

            const profitStr = (res.netProfit > 0 ? '+' : '') + res.netProfit.toFixed(2);
            resProfit.textContent = profitStr;
            
            // UI Color & Risk Margin logic
            if (res.netProfit > 0) {
                // Pro Feature: Risk Margin Check (< 1% of Capital)
                if (res.netProfit < (cap * 0.01)) {
                    resProfit.className = 'profit-val warning'; // Orange Pulse
                    resultsPanel.style.borderColor = '#FFA500'; 
                } else {
                    resProfit.className = 'profit-val positive'; // Healthy Green
                    resultsPanel.style.borderColor = '#39ff14'; 
                }
            } else {
                resProfit.className = 'profit-val'; // Red
                resultsPanel.style.borderColor = '#ff0055'; 
            }
        }

        // State Machine
        function saveState() {
            const state = {
                capital: elCap.value,
                odds1: elOdds1.value,
                bonus1: elBonus1.value,
                odds2: elOdds2.value,
                bonus2: elBonus2.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const state = JSON.parse(saved);
                    if (state.capital) elCap.value = state.capital;
                    if (state.odds1) elOdds1.value = state.odds1;
                    if (state.bonus1) elBonus1.value = state.bonus1;
                    if (state.odds2) elOdds2.value = state.odds2;
                    if (state.bonus2) elBonus2.value = state.bonus2;
                } catch (e) { console.error("Could not parse saved state."); }
            }
        }

        function loadScratchpad() {
            const savedNotes = localStorage.getItem(NOTES_KEY);
            if (savedNotes) {
                scratchpad.value = savedNotes;
            }
        }

        // Boot
        initApp();
    </script>
</body>
</html>
